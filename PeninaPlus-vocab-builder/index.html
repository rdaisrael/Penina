<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>PeninaPlus Vocabulary Builder</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <style>
        @font-face {
            font-family: 'Dyslexic-Kriah';
            src: url('Dyslexic-Kriah.otf') format('opentype');
            font-weight: normal; font-style: normal;
        }

        body { 
            font-family: Arial, sans-serif; 
            padding: 20px 0; 
            margin: 0; 
            background: radial-gradient(circle at center, #ffffff 0%, #fcfaf5 50%, #f0e9d8 100%);
            min-height: 100vh;
        }
        
        .bg-pattern {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            opacity: 0.15;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg width='300' height='300' xmlns='http://www.w3.org/2000/svg'%3E%3Ctext x='20' y='50' font-size='40' font-family='serif' fill='%238b7355'%3Eא%3C/text%3E%3Ctext x='150' y='80' font-size='60' font-family='serif' fill='%238b7355'%3Eפ%3C/text%3E%3Ctext x='250' y='40' font-size='35' font-family='serif' fill='%238b7355'%3Eג%3C/text%3E%3Ctext x='50' y='180' font-size='50' font-family='serif' fill='%238b7355'%3Eש%3C/text%3E%3Ctext x='200' y='220' font-size='45' font-family='serif' fill='%238b7355'%3Eל%3C/text%3E%3Ctext x='100' y='280' font-size='30' font-family='serif' fill='%238b7355'%3Eמ%3C/text%3E%3C/svg%3E");
            background-repeat: repeat;
        }

        .home-btn {
            position: absolute;
            top: 25px;
            left: 25px;
            display: flex;
            align-items: center;
            gap: 8px;
            background-color: #fdfbf7;
            color: #5a5248;
            border: 1px solid #dcd3c6;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 15px;
            font-weight: bold;
            text-decoration: none;
            box-shadow: 0 4px 8px rgba(139, 115, 85, 0.15);
            cursor: pointer;
            transition: all 0.2s ease;
            z-index: 1000;
        }

        .home-btn:hover {
            transform: translateY(-2px);
            background-color: #f4f0e6;
            color: #3a332a;
        }
        
        .home-btn svg { width: 18px; height: 18px; fill: currentColor; }

        .control-panel-wrapper { max-width: 900px; margin: 0 auto; padding: 0 20px; }
        
        .header-container { display: flex; justify-content: center; align-items: center; gap: 0px; margin-bottom: 0px; }
        .app-logo { max-width: 120px; height: auto; margin-right: -25px; margin-bottom: -10px; }
        h1.app-title { color: #4a4238; margin: 0; margin-top: 15px; font-size: 32px; }
        .copyright { text-align: center; font-style: italic; font-size: 14px; color: #6a6258; margin-bottom: 25px; }

        .control-panel { 
            background: rgba(255, 255, 255, 0.85); 
            -webkit-backdrop-filter: blur(5px);
            backdrop-filter: blur(5px); 
            padding: 25px; 
            border-radius: 10px; 
            box-shadow: 0 8px 16px rgba(139, 115, 85, 0.1); 
            border: 1px solid #f0e9d8; 
            margin-bottom: 20px; 
        }
        .form-group { margin-bottom: 20px; }
        label { font-weight: bold; display: block; margin-bottom: 8px; color: #5a5248; }
        
        input[type="text"], textarea, select { 
            width: 100%; padding: 10px; border: 1px solid #dcd3c6; 
            border-radius: 5px; box-sizing: border-box; font-size: 16px; 
            background-color: #fdfdfa; color: #3a332a; font-family: inherit; 
        }

        .roller-container { display: flex; gap: 15px; height: 120px; margin-top: 5px; }
        .roller { flex: 1; padding: 5px; font-size: 16px; border: 1px solid #dcd3c6; border-radius: 5px; background-color: #fdfdfa; outline: none; cursor: pointer; }

        .page-chip {
            display: inline-flex; align-items: center; background-color: #e0eaf5;
            border: 1px solid #b3cce6; border-radius: 12px; padding: 2px 8px;
            font-size: 13px; font-weight: bold; color: #333;
        }
        .chip-x { margin-left: 6px; color: #cc0000; cursor: pointer; }

        button { padding: 12px 25px; font-size: 16px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; color: white; background-color: #0056b3; width: 100%; }
        button:disabled { background-color: #6c757d !important; cursor: not-allowed; }

        .formatting-section { background: rgba(253, 251, 247, 0.8); padding: 25px; border-radius: 8px; border: 1px solid #dcd3c6; margin-bottom: 25px; }
        
        .page-container { 
            background: #fffefb; 
            margin: 0 auto; 
            box-shadow: 0 8px 20px rgba(139, 115, 85, 0.15); 
            min-height: 11in; 
            width: 8.5in; 
            padding: 0.75in; 
            direction: ltr;
        }
        
        h1.doc-title { background-color: #2c3e50; color: white; text-align: center; padding: 10px; font-size: 18pt; border-radius: 4px; }
        table { width: 100%; border-collapse: collapse; border: 1px solid #dcd3c6; }
        th, td { border: 1px solid #dcd3c6; padding: 10pt; vertical-align: top; }
        th { background-color: #f4efe6; font-weight: bold; text-align: center; }
        
        .col-hebrew { direction: rtl; text-align: right; font-size: 14pt; font-weight: bold; white-space: nowrap; width: 1%; }
        .col-english { text-align: left; font-size: 12pt; width: 125pt; min-width: 125pt; }
        .col-context { text-align: right; font-size: 10pt; line-height: 1.4; }
        
        .hebrew-text { direction: rtl; }
        .english-text { font-style: italic; margin-top: 4px; }
        .citation { font-size: 9pt; margin-top: 4px; color: #666; }
        
        @media print {
            body { background: white; padding: 0; }
            .bg-pattern, .home-btn, .control-panel-wrapper { display: none !important; }
            .page-container { margin: 0 !important; width: 100% !important; box-shadow: none !important; }
        }
    </style>
</head>
<body class="mode-full">

    <div class="bg-pattern"></div>
    <a href="/" class="home-btn">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        Home
    </a>

    <div class="control-panel-wrapper">
        <div class="header-container">
            <img src="peninaplus-logo.png" alt="Logo" class="app-logo">
            <h1 class="app-title">PeninaPlus Vocabulary Builder</h1>        
        </div>
        <div class="copyright">&copy; 2026 David Israel</div>

        <div class="control-panel">
            <div class="form-group">
                <label for="list-title">Title:</label>
                <input type="text" id="list-title" placeholder="e.g., Masechet Berakhot Vocab">
            </div>

            <div class="form-group" style="display: flex; gap: 20px;">
                <div style="flex: 1;">
                    <label for="source-type">Source:</label>
                    <select id="source-type">
                        <option value="Tanakh">Tanakh</option>
                        <option value="Talmud">Talmud Bavli</option>
                        <option value="Modern Hebrew">Modern Hebrew</option>
                    </select>
                </div>
                <div style="flex: 1;" id="specific-source-container">
                    <label id="specific-source-label">Chapter/Daf:</label>
                    <div style="display: flex; flex-direction: column; gap: 10px;">
                        <div style="display: flex; gap: 15px; height: 85px;">
                            <select id="book-select" size="3" class="roller"></select>
                            <select id="num-picker" size="3" class="roller" disabled></select>
                            <button type="button" id="add-chip-btn" style="width: auto;" disabled>Add</button>
                        </div>
                        <div id="chip-container" style="border: 1px solid #dcd3c6; padding: 5px; display: flex; flex-wrap: wrap; gap: 4px; min-height: 45px;"></div>
                        <input type="hidden" id="hidden-chapter-input" value="ANY">
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label for="word-list">Words (Hebrew, English):</label>
                <textarea id="word-list" rows="5" placeholder="אגרא, reward"></textarea>
            </div>

            <button id="generate-btn">Generate Table</button>

            <div class="formatting-section">
                <h3>Formatting</h3>
                <label><input type="checkbox" id="substitute-names" onchange="updateTextDisplay()"> Substitute 'ה and אלוקים</label>
                <div style="display: flex; gap: 20px; margin-top: 15px;">
                    <select id="nekudot-toggle" onchange="updateTextDisplay()">
                        <option value="show">Show Nekudot</option>
                        <option value="strip">Strip Nekudot</option>
                    </select>
                    <select id="font-choice" onchange="document.getElementById('vocab-table').style.fontFamily = this.value">
                        <option value="Arial">Arial</option>
                        <option value="'David'">David</option>
                        <option value="'Dyslexic-Kriah'">Dyslexic-Kriah</option>
                    </select>
                </div>
            </div>
            <button onclick="window.print()" style="background-color: #28a745;">Print Sheet</button>
        </div>
    </div>

    <div class="paper-viewport">
        <div id="page" class="page-container" style="display: none;">
            <h1 id="doc-title" class="doc-title"></h1>
            <table id="vocab-table">
                <thead><tr><th>Word</th><th>Definition</th><th>Context</th></tr></thead>
                <tbody id="vocab-tbody"></tbody>
            </table>
        </div>
    </div>

    <script>
        const sourceData = {
            Tanakh: { "Genesis": 50, "Exodus": 40, "Leviticus": 27, "Numbers": 36, "Deuteronomy": 34, "Psalms": 150 },
            Talmud: { "Berakhot": 64, "Shabbat": 157, "Eruvin": 105, "Pesachim": 121, "Gittin": 90 }
        };

        function getHebrewTractateName(en) {
            const map = { "Berakhot": "ברכות", "Shabbat": "שבת", "Eruvin": "עירובין", "Genesis": "בראשית", "Exodus": "שמות" };
            return map[en] || en;
        }

        // Logic to convert Dicta results into Sefaria-ready references
        function formatRefForSefaria(book, dictaLoc, corpus) {
            if (corpus === 'Tanakh') {
                // Dicta usually returns "Genesis 1:1" or similar
                return dictaLoc.replace(/\s/g, '.');
            }
            // Talmud Daf conversion
            const dafMatch = dictaLoc.match(/([א-ת]+)\s*(ע״א|ע״ב)?/);
            if (!dafMatch) return book;
            const vals = { 'א':1,'ב':2,'ג':3,'ד':4,'ה':5,'ו':6,'ז':7,'ח':8,'ט':9,'י':10,'כ':20,'ל':30,'מ':40,'נ':50,'ס':60,'ע':70,'פ':80,'צ':90,'ק':100,'ר':200,'ש':300,'ת':400 };
            let num = 0; for (let c of dafMatch[1]) { num += (vals[c] || 0); }
            return `${book} ${num}${dictaLoc.includes('ע״ב') ? 'b' : 'a'}`;
        }

        function getHebrewSkeleton(t) { return t ? t.replace(/[\u0591-\u05C7]/g, "").replace(/[^\u05D0-\u05EA]/g, "").trim() : ""; }

        document.addEventListener("DOMContentLoaded", () => {
            const stSelect = document.getElementById('source-type');
            const bkSelect = document.getElementById('book-select');
            const nPicker = document.getElementById('num-picker');
            const chipBox = document.getElementById('chip-container');
            const hidInput = document.getElementById('hidden-chapter-input');
            let chips = [];

            stSelect.onchange = (e) => {
                const val = e.target.value;
                bkSelect.innerHTML = '<option value="ANY">-- Any --</option>';
                chips = []; renderChips();
                document.getElementById('specific-source-container').style.display = val === 'Modern Hebrew' ? 'none' : 'block';
                if (sourceData[val]) Object.keys(sourceData[val]).forEach(b => {
                    const opt = document.createElement('option'); opt.value = b; opt.textContent = b; bkSelect.appendChild(opt);
                });
            };

            bkSelect.onchange = () => {
                const book = bkSelect.value;
                nPicker.innerHTML = ''; nPicker.disabled = book === 'ANY';
                document.getElementById('add-chip-btn').disabled = book === 'ANY';
                if (book === 'ANY') return;
                const limit = sourceData[stSelect.value][book];
                for (let i = 1; i <= limit; i++) {
                    if (stSelect.value === 'Talmud') {
                        const a = document.createElement('option'); a.value = i+'a'; a.textContent = i+'a'; nPicker.appendChild(a);
                        const b = document.createElement('option'); b.value = i+'b'; b.textContent = i+'b'; nPicker.appendChild(b);
                    } else {
                        const o = document.createElement('option'); o.value = i; o.textContent = i; nPicker.appendChild(o);
                    }
                }
            };

            document.getElementById('add-chip-btn').onclick = () => {
                if (!nPicker.value || chips.includes(nPicker.value)) return;
                chips.push(nPicker.value); renderChips();
            };

            function renderChips() {
                chipBox.innerHTML = chips.length ? '' : 'Select book...';
                chips.forEach(c => {
                    const s = document.createElement('span'); s.className = 'page-chip';
                    s.innerHTML = `${c} <span class="chip-x" onclick="removeChip('${c}')">×</span>`;
                    chipBox.appendChild(s);
                });
                hidInput.value = chips.join(', ') || 'ANY';
            }

            window.removeChip = (c) => { chips = chips.filter(x => x !== c); renderChips(); };

            async function getSefariaResult(word, corpus, book, pages) {
                // Tanakh and Talmud now both route through Dicta for better lemmatized search
                const isClassical = corpus === 'Talmud' || corpus === 'Tanakh';
                
                if (isClassical) {
                    const genre = corpus === 'Tanakh' ? 'biblical' : 'rabbinic';
                    const dictaRes = await fetch('/api/dicta-search', {
                        method: "POST", headers: {"Content-Type": "application/json"},
                        body: JSON.stringify({ 
                            query: word, 
                            tractate: book !== 'ANY' ? getHebrewTractateName(book) : "",
                            genre: genre
                        })
                    });
                    const dData = await dictaRes.json();
                    if (dData.results?.length) {
                        const hit = dData.results[0];
                        const ref = formatRefForSefaria(book !== 'ANY' ? book : (corpus === 'Tanakh' ? "Genesis" : "Berakhot"), hit.location, corpus);
                        const sRes = await fetch(`https://www.sefaria.org/api/texts/${ref}?context=0`);
                        const sData = await sRes.json();
                        
                        // Use skeletons to find the exact line in Sefaria matching Dicta's result
                        const skel = getHebrewSkeleton(hit.text);
                        const idx = sData.he.findIndex(l => getHebrewSkeleton(l).includes(skel));
                        return { he: sData.he[idx] || sData.he[0], en: sData.text[idx] || sData.text[0], heRef: sData.heRef, ref: ref };
                    }
                }

                // Fallback for non-classical or failed Dicta results
                const res = await fetch('/api/sefaria-search', {
                    method: "POST", headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ query: word, type: "text", field: "naive_lemmatizer", filters: book !== 'ANY' ? [book] : [] })
                });
                const data = await res.json();
                if (data.hits?.hits?.length) {
                    const ref = data.hits.hits[0]._source.ref;
                    const tRes = await fetch(`https://www.sefaria.org/api/texts/${ref}?context=0`);
                    const tData = await tRes.json();
                    return { he: tData.he, en: tData.text, heRef: tData.heRef, ref: ref };
                }
                return null;
            }

            document.getElementById('generate-btn').onclick = async () => {
                const raw = document.getElementById('word-list').value;
                if (!raw) return;
                const btn = document.getElementById('generate-btn');
                btn.disabled = true; btn.innerText = "Processing...";
                
                const tbody = document.getElementById('vocab-tbody'); tbody.innerHTML = '';
                let pairs = raw.split('\n').map(l => ({ he: l.split(',')[0]?.trim(), en: l.split(',')[1]?.trim() })).filter(p => p.he);

                for (let p of pairs) {
                    let heCtx = "", enCtx = "", cit = "";
                    if (stSelect.value === 'Modern Hebrew') {
                        const r = await fetch('/api/translate', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ promptText: `Sentence in Modern Hebrew for "${p.he}".` })});
                        const d = await r.json(); heCtx = d.text; cit = "Modern Hebrew";
                    } else {
                        const res = await getSefariaResult(p.he, stSelect.value, bkSelect.value, hidInput.value);
                        if (res) { heCtx = res.he; enCtx = res.en; cit = `${res.heRef} (${res.ref})`; }
                    }
                    if (heCtx && !enCtx) {
                        const tr = await fetch('/api/translate', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ promptText: `Translate to English: "${heCtx}"` })});
                        const td = await tr.json(); enCtx = td.text;
                    }
                    const row = document.createElement('tr');
                    row.innerHTML = `<td class="col-hebrew"><span class="hebrew-word" data-original="${p.he}">${p.he}</span></td><td class="col-english">${p.en || ''}</td><td class="col-context"><div class="hebrew-text" data-original="${heCtx}">${heCtx}</div><div class="english-text">${enCtx}</div><div class="citation">${cit}</div></td>`;
                    tbody.appendChild(row);
                }
                document.getElementById('page').style.display = 'block';
                document.getElementById('doc-title').innerText = document.getElementById('list-title').value || "Vocabulary List";
                updateTextDisplay(); btn.disabled = false; btn.innerText = "Generate Table";
            };
        });

        function updateTextDisplay() {
            const strip = document.getElementById('nekudot-toggle').value === 'strip';
            const sub = document.getElementById('substitute-names').checked;
            document.querySelectorAll('.hebrew-word, .hebrew-text').forEach(el => {
                let h = el.dataset.original;
                if (sub) h = h.replace(/י[\u0591-\u05C7]*ה[\u0591-\u05C7]*ו[\u0591-\u05C7]*ה/g, 'ה׳').replace(/א[\u0591-\u05C7]*ל[\u0591-\u05C7]*ו[\u0591-\u05C7]*ה[\u0591-\u05C7]*י[\u0591-\u05C7]*ם/g, 'אלוקים');
                if (strip) h = h.replace(/[\u0591-\u05C7]/g, "");
                el.innerHTML = h;
            });
        }
    </script>
</body>
</html>
